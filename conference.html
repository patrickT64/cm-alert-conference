<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f1e">
  <title>CM Alert — Conference Call</title>
 <script src="https://sdk.twilio.com/js/client/releases/1.14.0/twilio.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a0f1e;
      --navy-mid: #111827;
      --navy-light: #1e2a3a;
      --border: rgba(255,255,255,0.08);
      --text-primary: #f0f4ff;
      --text-secondary: #8899bb;
      --text-muted: #445577;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--navy);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(30,58,138,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .alert-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .badge-giallo { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    .badge-rosso { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    .pulse-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 24px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(239,68,68,0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .pulse-inner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .pulse-inner.connected { background: var(--green); }
    .pulse-inner svg { width: 28px; height: 28px; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-text {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      min-height: 24px;
    }

    .status-text.connecting { color: var(--amber); }
    .status-text.connected { color: var(--green); }
    .status-text.error { color: var(--red); }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .btn-connect {
      background: var(--green);
      color: #052e16;
    }

    .btn-connect:hover { background: #16a34a; }
    .btn-connect:disabled { background: var(--navy-light); color: var(--text-muted); cursor: not-allowed; border: 1px solid var(--border); }

    .btn-disconnect {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.3);
      display: none;
    }

    .btn-disconnect:hover { background: rgba(239,68,68,0.25); }

    .participants {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    .logo-small {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="alert-badge badge-rosso" id="alert-badge">Allerta</div>

    <div class="pulse-ring">
      <div class="pulse-inner" id="pulse-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.09-1.09a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
    </div>

    <h1 id="room-title">Conference Call</h1>
    <p class="subtitle" id="room-subtitle">Connettiti alla conference call di emergenza TT&amp;A Advisors</p>

    <div class="status-label">Stato connessione</div>
    <div class="status-text" id="status-text">In attesa...</div>

    <button class="btn btn-connect" id="btn-connect" onclick="connectToConference()">
      Entra nella conference call
    </button>
    <button class="btn btn-disconnect" id="btn-disconnect" onclick="disconnect()">
      Disconnetti
    </button>

    <div class="participants" id="participants"></div>
    <div class="logo-small">TT&amp;A Advisors · CM Alert</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room') || 'CMAlert-Giallo';
    const level = urlParams.get('level') || '2';

    const badge = document.getElementById('alert-badge');
    const title = document.getElementById('room-title');

    if (room === 'CMAlert-Rosso' || level === '3') {
      badge.textContent = 'Codice Rosso';
      badge.className = 'alert-badge badge-rosso';
      title.textContent = 'Conference — Codice Rosso';
    } else {
      badge.textContent = 'Codice Giallo';
      badge.className = 'alert-badge badge-giallo';
      title.textContent = 'Conference — Codice Giallo';
    }

    let device = null;
    let connection = null;

    function setStatus(text, type) {
      const el = document.getElementById('status-text');
      el.textContent = text;
      el.className = 'status-text ' + (type || '');
    }

    async function connectToConference() {
      const btn = document.getElementById('btn-connect');
      btn.disabled = true;
      setStatus('Recupero token...', 'connecting');

      try {
        const res = await fetch(`/.netlify/functions/token?room=${room}`);
        const data = await res.json();

        if (!data.token) throw new Error('Token non ricevuto');

        setStatus('Connessione in corso...', 'connecting');

        device = new Twilio.Device(data.token, { codecPreferences: ['opus', 'pcmu'] });

        device.on('ready', function() {
          setStatus('Dispositivo pronto, connessione...', 'connecting');
          connection = device.connect({ To: room, room: room });

          connection.on('accept', function() {
            setStatus('Connesso alla conference call', 'connected');
            document.getElementById('pulse-inner').classList.add('connected');
            document.getElementById('btn-disconnect').style.display = 'block';
            btn.style.display = 'none';
          });

          connection.on('disconnect', function() {
            setStatus('Disconnesso', '');
            document.getElementById('pulse-inner').classList.remove('connected');
            document.getElementById('btn-disconnect').style.display = 'none';
            btn.style.display = 'block';
            btn.disabled = false;
          });

          connection.on('error', function(err) {
            setStatus('Errore: ' + err.message, 'error');
            btn.disabled = false;
          });
        });

        device.on('error', function(err) {
          setStatus('Errore dispositivo: ' + err.message, 'error');
          btn.disabled = false;
        });

      } catch(e) {
        setStatus('Errore: ' + e.message, 'error');
        btn.disabled = false;
      }
    }

    function disconnect() {
      if (connection) connection.disconnect();
      if (device) device.destroy();
    }
  </script>
</body>
</html>
